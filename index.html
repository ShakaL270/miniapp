<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Your Waifu</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
  <main class="app">
    <section class="top-panel">
      <div class="hello">
        <strong id="userStatus">Привет</strong>
        <span>Выбери персонажа</span>
      </div>
    </section>

    <!-- Вкладки -->
    <nav class="tabs">
      <button class="tab-btn active" data-tab="characters">👥 Персонажи</button>
      <button class="tab-btn" data-tab="subscriptions">💎 Подписки</button>
    </nav>

    <!-- Вкладка: Персонажи -->
    <section id="tab-characters" class="tab-content active">
      <section class="toolbar" aria-label="Фильтры персонажей">
        <label class="search" aria-label="Поиск персонажа">
          <input id="searchInput" type="search" placeholder="Поиск персонажа">
        </label>
      </section>

      <section class="grid" id="girlsGrid">
        <div class="empty">Загрузка персонажей...</div>
      </section>
    </section>

    <!-- Вкладка: Подписки -->
    <section id="tab-subscriptions" class="tab-content">
      <section class="subscriptions-list" id="subscriptionsList">
        <div class="empty">Загрузка подписок...</div>
      </section>
    </section>
  </main>

  <!-- Детальный просмотр -->
  <section class="detail" id="detailView" aria-hidden="true">
    <div class="detail-shell" role="dialog" aria-modal="true" aria-labelledby="detailName">
      <button class="detail-close" type="button" id="detailClose" aria-label="Закрыть">✕</button>
      <div class="detail-photo" id="detailPhoto"></div>
      <div class="detail-content">
        <div class="detail-meta">
          <span id="detailType"></span>
          <span id="detailAge"></span>
        </div>
        <h2 id="detailName">Персонаж</h2>
        <p class="detail-role" id="detailRole"></p>
        <p class="detail-quote" id="detailDescription"></p>
        <button class="choose-button" type="button" id="detailChoose">Выбрать персонажа</button>
      </div>
    </div>
  </section>

  <script src="data.js?v=4"></script>
  <script src="app.js?v=4"></script>
</body>
</html>
